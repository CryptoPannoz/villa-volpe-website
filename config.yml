# ============================================
# VILLA VOLPE — Decap CMS Configuration
# ============================================
#
# SETUP INSTRUCTIONS:
# 1. Create a GitHub repo and push this site to it
# 2. Deploy on Netlify (connect the GitHub repo)
# 3. Enable Netlify Identity in Netlify dashboard
# 4. Enable Git Gateway in Netlify Identity settings
# 5. Invite yourself as a user via Netlify Identity
# 6. Access the CMS at yourdomain.com/admin/
#

backend:
  name: git-gateway
  branch: main

# Media files will be stored in /images/uploads
media_folder: "images/uploads"
public_folder: "/images/uploads"

# Site URL (update after deployment)
site_url: https://www.villa-volpe.com
display_url: https://www.villa-volpe.com

# Locale
locale: 'en'

# Collections
collections:

  # ---- Blog Posts ----
  - name: "blog"
    label: "Blog Posts"
    folder: "blog/posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    summary: "{{title}} — {{date}}"
    sortable_fields: ['date', 'title']
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "Featured Image", name: "thumbnail", widget: "image", required: false }
      - { label: "Category", name: "category", widget: "select", options: ["Destination Guide", "Destination Comparison", "Local History", "Accessibility", "Activities", "Dining", "Local Stories"], default: "Destination Guide" }
      - { label: "Excerpt", name: "excerpt", widget: "text", pattern: ['.{10,200}', "Must be between 10 and 200 characters"] }
      - { label: "Body", name: "body", widget: "markdown" }
      - { label: "Language", name: "lang", widget: "select", options: ["en", "it", "de"], default: "en" }

  # ---- Pages ----
  - name: "pages"
    label: "Pages"
    files:
      # Home page
      - label: "Home Page"
        name: "home"
        file: "content/home.json"
        fields:
          - { label: "Hero Title", name: "heroTitle", widget: "string", default: "Villa Volpe" }
          - { label: "Hero Subtitle", name: "heroSubtitle", widget: "text" }
          - { label: "Hero Image", name: "heroImage", widget: "image", required: false }
          - label: "Stats"
            name: "stats"
            widget: "list"
            fields:
              - { label: "Number", name: "number", widget: "string" }
              - { label: "Label", name: "label", widget: "string" }

      # Discover page
      - label: "Discover Page"
        name: "discover"
        file: "content/discover.json"
        fields:
          - { label: "Page Title", name: "title", widget: "string" }
          - { label: "Page Description", name: "description", widget: "text" }
          - label: "Amenities"
            name: "amenities"
            widget: "list"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Description", name: "description", widget: "string" }

      # Booking page
      - label: "Booking Page"
        name: "booking"
        file: "content/booking.json"
        fields:
          - { label: "Page Title", name: "title", widget: "string" }
          - { label: "Contact Email", name: "email", widget: "string" }
          - { label: "Contact Phone", name: "phone", widget: "string" }
          - label: "Policies"
            name: "policies"
            widget: "list"
            fields:
              - { label: "Policy Title", name: "title", widget: "string" }
              - { label: "Policy Text", name: "text", widget: "text" }

  # ---- Site Settings ----
  - name: "settings"
    label: "Site Settings"
    files:
      - label: "General Settings"
        name: "general"
        file: "content/settings.json"
        fields:
          - { label: "Site Name", name: "siteName", widget: "string", default: "Villa Volpe" }
          - { label: "Contact Email", name: "email", widget: "string", default: "villavolpeorta@gmail.com" }
          - { label: "Contact Phone", name: "phone", widget: "string", default: "+39 333 685 9707" }
          - { label: "Address", name: "address", widget: "text", default: "Via Novara 38, Orta San Giulio 28016, Italy" }
          - { label: "CIN Code", name: "cin", widget: "string", default: "IT003112C2L7M2HAGX" }
          - { label: "CIR Code", name: "cir", widget: "string", default: "00311200109" }
          - { label: "Airbnb URL", name: "airbnbUrl", widget: "string", default: "https://www.airbnb.com/rooms/26816946" }
          - { label: "Airbnb Discount (%)", name: "discount", widget: "number", default: 15, value_type: "int", min: 0, max: 50 }
