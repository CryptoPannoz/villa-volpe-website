# ============================================
# VILLA VOLPE — Netlify Configuration
# ============================================

[build]
  publish = "."

# Redirect www to non-www (or vice versa — adjust as needed)
[[redirects]]
  from = "https://www.villa-volpe.com/*"
  to = "https://villa-volpe.com/:splat"
  status = 301
  force = true

# SPA-style fallback for clean URLs (optional)
# [[redirects]]
#   from = "/*"
#   to = "/index.html"
#   status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache static assets
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"
